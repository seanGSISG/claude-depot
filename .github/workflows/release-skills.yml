name: Build and Release Skills

on:
  push:
    branches: [main]
    paths: ['plugins/**']
    tags:
      - 'v*'
      - '*-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Always runs: validate and package all skills
  build-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate and package all skills
        run: |
          mkdir -p dist
          VALIDATE="plugins/skill-creator-enhanced/scripts/quick_validate.py"
          BUILT=0

          for skill_dir in plugins/*/skills/*/; do
            skill_name=$(basename "$skill_dir")

            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "::warning::Skipping $skill_name — no SKILL.md"
              continue
            fi

            echo "--- Validating $skill_name ---"
            if ! python "$VALIDATE" "$skill_dir"; then
              echo "::error::Validation failed for $skill_name"
              exit 1
            fi

            echo "--- Packaging $skill_name ---"
            parent_dir=$(dirname "$skill_dir")
            (cd "$parent_dir" && zip -r "$GITHUB_WORKSPACE/dist/${skill_name}.skill" "$skill_name" -x '*/__pycache__/*' '*.pyc')
            BUILT=$((BUILT + 1))
            echo "Built: dist/${skill_name}.skill"
          done

          if [[ "$BUILT" -eq 0 ]]; then
            echo "::error::No skills were built"
            exit 1
          fi
          echo "Built $BUILT skill(s)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skill-files
          path: dist/*.skill

  # Runs on every push to main (and workflow_dispatch): update rolling "latest" release
  publish-latest:
    needs: build-skills
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: skill-files
          path: dist

      - name: Force-update latest tag
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Skills"
          body: |
            Always up-to-date `.skill` files built from `main`.

            Download any `.skill` file and upload it to **Claude.ai** (Settings > Skills) or **Claude Desktop**.

            _Last updated: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}_
          files: dist/*.skill
          fail_on_unmatched_files: true
          make_latest: false

  # Runs on version tags only: create versioned release with version verification
  publish-versioned:
    needs: build-skills
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify tag-to-plugin.json version consistency
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Only verify for single-plugin tags (e.g. trmm-expert-v1.0.0)
          if [[ "$TAG" != v* ]]; then
            PLUGIN_NAME="${TAG%-v*}"
            TAG_VERSION="${TAG##*-v}"
            PLUGIN_JSON="plugins/${PLUGIN_NAME}/.claude-plugin/plugin.json"
            if [ -f "$PLUGIN_JSON" ]; then
              JSON_VERSION=$(python -c "import json; print(json.load(open('$PLUGIN_JSON'))['version'])")
              if [[ "$TAG_VERSION" != "$JSON_VERSION" ]]; then
                echo "::error::Tag version ($TAG_VERSION) does not match $PLUGIN_JSON version ($JSON_VERSION)"
                exit 1
              fi
              echo "Version match: $PLUGIN_NAME $JSON_VERSION"
            else
              echo "::error::Plugin not found: $PLUGIN_JSON"
              exit 1
            fi
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: skill-files
          path: dist

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
          generate_release_notes: true
          fail_on_unmatched_files: true
